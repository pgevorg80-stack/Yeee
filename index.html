<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>С Днём Рождения!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#fde8ef 0%,#fbc9d8 45%,#f4a0b8 100%);
  font-family:'Cormorant Garamond',serif;
  overflow:hidden;
  gap:16px;
}

.hint{
  font-size:.78rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:#c0406a;
  animation:blink 2s ease-in-out infinite;
  user-select:none;
  transition:opacity .4s;
}
.hint.gone{opacity:0}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.85}}

.book{
  position:relative;
  width:min(85vw, 380px);
  height:min(113vw, 500px);
}

.inside{
  position:absolute;
  inset:0;
  border-radius:20px;
  background:#fdf0f3;
  border:1.5px solid rgba(232,121,138,.2);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 28px;
  gap:0;
  box-shadow:0 12px 48px rgba(192,64,106,.18);
}
.inside::after{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:45%;height:3px;
  background:linear-gradient(90deg,transparent,#e8c07a,transparent);
  border-radius:0 0 3px 3px;
}

.back-rose{
  width:100px;margin-bottom:10px;
  animation:floatY 4s ease-in-out infinite;
}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.back-eyebrow{font-size:.67rem;letter-spacing:.28em;text-transform:uppercase;color:#e8798a;margin-bottom:6px}
.back-heading{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.4rem,6vw,2rem);
  font-weight:700;color:#c0406a;text-align:center;line-height:1.15;margin-bottom:3px;
}
.back-sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(.9rem,3.8vw,1.15rem);color:#e8798a;text-align:center;margin-bottom:12px;
}
.back-divider{
  display:flex;align-items:center;gap:10px;width:65%;margin-bottom:12px;
}
.back-divider span{flex:1;height:1px;background:linear-gradient(90deg,transparent,#f9c7d4)}
.back-divider span:last-child{background:linear-gradient(90deg,#f9c7d4,transparent)}
.back-divider i{color:#e8c07a;font-style:normal}
.back-message{
  font-size:.98rem;line-height:1.9;color:#5a1a33;
  text-align:center;font-style:italic;font-weight:300;margin-bottom:16px;
}
.balloons{display:flex;gap:12px;font-size:1.7rem}
.balloon{animation:sway 3s ease-in-out infinite;transform-origin:bottom center}
.balloon:nth-child(2){animation-delay:.5s}
.balloon:nth-child(3){animation-delay:1s}
@keyframes sway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}

.cover{
  position:absolute;
  inset:0;
  border-radius:20px;
  background:linear-gradient(155deg,#fde8ef 0%,#f9c7d4 55%,#f2a5bc 100%);
  border:1.5px solid rgba(232,121,138,.25);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  cursor:pointer;
  transform-origin:left center;
  transition:transform .9s cubic-bezier(.77,0,.18,1), opacity .9s ease;
  box-shadow:4px 0 20px rgba(192,64,106,.15);
}
.cover.open{
  transform:rotateY(-180deg);
  opacity:0;
  pointer-events:none;
}
.cover::before{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:52%;height:4px;
  background:linear-gradient(90deg,transparent,#e8c07a,transparent);
  border-radius:0 0 4px 4px;
}

.cover-bow{
  font-size:3.6rem;
  filter:drop-shadow(0 4px 10px rgba(192,64,106,.3));
  animation:floatY 3.2s ease-in-out infinite;
  margin-bottom:6px;
}
.cover-eyebrow{font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:#e8798a;margin-bottom:8px}
.cover-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,8.5vw,2.7rem);
  font-weight:700;color:#c0406a;text-align:center;line-height:1.1;
}
.cover-title em{display:block;font-style:italic;font-weight:400;font-size:.68em;color:#e8798a}
.cover-divider{
  display:flex;align-items:center;gap:10px;width:60%;margin:12px auto;
}
.cover-divider span{flex:1;height:1px;background:linear-gradient(90deg,transparent,#e8798a)}
.cover-divider span:last-child{background:linear-gradient(90deg,#e8798a,transparent)}
.cover-divider i{color:#e8c07a;font-style:normal}
.cover-tap{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#c0406a;opacity:.5}

.sparks{display:flex;gap:7px;margin-top:13px}
.sp{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.sp:nth-child(1){background:#e8798a;animation-delay:0s}
.sp:nth-child(2){background:#e8c07a;animation-delay:.3s}
.sp:nth-child(3){background:#c0406a;animation-delay:.6s}
.sp:nth-child(4){background:#e8c07a;animation-delay:.9s}
.sp:nth-child(5){background:#e8798a;animation-delay:1.2s}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.8);opacity:1}}

.corner-rose{position:absolute;font-size:1.3rem;opacity:.45}
.corner-rose.tl{top:14px;left:14px;transform:rotate(-20deg)}
.corner-rose.tr{top:14px;right:14px;transform:rotate(20deg)}
.corner-rose.bl{bottom:14px;left:14px;transform:rotate(20deg)}
.corner-rose.br{bottom:14px;right:14px;transform:rotate(-20deg)}

.petal{position:fixed;border-radius:50% 0 50% 0;pointer-events:none;opacity:0;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:.7}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<p class="hint" id="hint">✦ Нажми, чтобы открыть ✦</p>

<div class="book">

  <div class="inside">
    <svg class="back-rose" viewBox="0 0 120 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="68" rx="12" ry="6" fill="#c5de9a" transform="rotate(-40 22 68)"/>
      <ellipse cx="14" cy="54" rx="10" ry="5" fill="#d4e8b0" transform="rotate(-55 14 54)"/>
      <ellipse cx="98" cy="68" rx="12" ry="6" fill="#c5de9a" transform="rotate(40 98 68)"/>
      <ellipse cx="106" cy="54" rx="10" ry="5" fill="#d4e8b0" transform="rotate(55 106 54)"/>
      <path d="M32 95 Q60 108 88 95" stroke="#c5de9a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="60" cy="52" r="20" fill="#e8798a" opacity=".9"/>
      <circle cx="60" cy="52" r="13" fill="#f4a0b8"/>
      <circle cx="60" cy="52" r="8"  fill="#e8798a"/>
      <circle cx="60" cy="52" r="3.5" fill="#fde8ef"/>
      <ellipse cx="60" cy="33" rx="5.5" ry="9" fill="#f9c7d4" opacity=".85"/>
      <ellipse cx="60" cy="71" rx="5.5" ry="9" fill="#f9c7d4" opacity=".85"/>
      <ellipse cx="41" cy="52" rx="9" ry="5.5" fill="#f9c7d4" opacity=".85"/>
      <ellipse cx="79" cy="52" rx="9" ry="5.5" fill="#f9c7d4" opacity=".85"/>
      <ellipse cx="47" cy="38" rx="6" ry="9" fill="#f9c7d4" opacity=".7" transform="rotate(-45 47 38)"/>
      <ellipse cx="73" cy="38" rx="6" ry="9" fill="#f9c7d4" opacity=".7" transform="rotate(45 73 38)"/>
      <ellipse cx="47" cy="66" rx="6" ry="9" fill="#f9c7d4" opacity=".7" transform="rotate(45 47 66)"/>
      <ellipse cx="73" cy="66" rx="6" ry="9" fill="#f9c7d4" opacity=".7" transform="rotate(-45 73 66)"/>
      <circle cx="60" cy="16" r="2.5" fill="#e8c07a"/>
      <circle cx="42" cy="22" r="2" fill="#e8c07a"/>
      <circle cx="78" cy="22" r="2" fill="#e8c07a"/>
    </svg>

    <p class="back-eyebrow">✦ С любовью ✦</p>
    <h2 class="back-heading">Счастья тебе</h2>
    <p class="back-sub">в каждом мгновении!</p>
    <div class="back-divider"><span></span><i>❧</i><span></span></div>
    <p class="back-message">
      Пусть этот день сверкает<br>
      радостью и теплом.<br>
      Пусть исполняются мечты<br>
      и жизнь цветёт как роза. 🌸
    </p>
    <div class="balloons">
      <span class="balloon">🎈</span>
      <span class="balloon">🎂</span>
      <span class="balloon">🎁</span>
    </div>
  </div>

  <div class="cover" id="cover" onclick="openCard()">
    <span class="corner-rose tl">🌸</span>
    <span class="corner-rose tr">🌸</span>
    <span class="corner-rose bl">🌸</span>
    <span class="corner-rose br">🌸</span>

    <div class="cover-bow">🎀</div>
    <p class="cover-eyebrow">✦ Для тебя ✦</p>
    <h2 class="cover-title">С Днём<em>Рождения!</em></h2>
    <div class="cover-divider"><span></span><i>❧</i><span></span></div>
    <p class="cover-tap">Открой меня</p>
    <div class="sparks">
      <span class="sp"></span><span class="sp"></span><span class="sp"></span>
      <span class="sp"></span><span class="sp"></span>
    </div>
  </div>

</div>

<script>
const pc=['#f9c7d4','#e8798a','#c0406a','#f4a0b8','#e8c07a','#fde8ef'];
for(let i=0;i<30;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.style.cssText=`left:${Math.random()*100}vw;width:${6+Math.random()*10}px;height:${8+Math.random()*14}px;background:${pc[Math.floor(Math.random()*pc.length)]};animation-duration:${5+Math.random()*9}s;animation-delay:${Math.random()*12}s;`;
  document.body.appendChild(p);
}

let opened=false;
function openCard(){
  if(opened)return;
  opened=true;
  document.getElementById('cover').classList.add('open');
  document.getElementById('hint').classList.add('gone');
  burst();
}

function burst(){
  const colors=['#f9c7d4','#e8798a','#c0406a','#f4a0b8','#e8c07a','#c5de9a','#fff'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');
    const x=window.innerWidth/2, y=window.innerHeight/2;
    c.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none;z-index:999;`;
    document.body.appendChild(c);
    const a=Math.random()*Math.PI*2;
    const d=100+Math.random()*230;
    c.animate([
      {transform:'translate(0,0) scale(1) rotate(0deg)',opacity:1},
      {transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d-80}px) scale(0) rotate(${Math.random()*720}deg)`,opacity:0}
    ],{duration:900+Math.random()*600,easing:'cubic-bezier(.22,1,.36,1)',fill:'forwards',delay:Math.random()*150});
    setTimeout(()=>c.remove(),1800);
  }
}
</script>
</body>
</html>
